<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - {{ username }}</title>
</head>
<body>
    <h1>Welcome, {{ username }}!</h1>
    <p>Your favorite language is: {{ p_lang }}.</p>

    <ul>
        {% for hobby in u_hobby %}
        <li>{{ hobby }}</li>
        {% endfor %}
    </ul>
</body>
</html>
